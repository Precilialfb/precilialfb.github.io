<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LFB Studio</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root{
      --warm-white: #f6f1e8;
      --text-warm:  #f3eadf;
      --text-dark:  #1a1a1a;
    }

    body {
      font-family: Helvetica, Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 22px 50px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text-warm);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.9rem;
    }

    /* LOGO HAUT GAUCHE AGRANDI */
    .logo-small {
      width: 40px;   /* agrandi légèrement */
      height: auto;
      display: block;
    }

    nav a {
      margin-left: 26px;
      text-decoration: none;
      color: var(--text-warm);
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.95;
      transition: opacity 0.2s ease;
    }

    nav a:hover { opacity: 0.65; }

    /* HERO */
    .hero {
      height: 100vh;
      background-image: url("accueil site.jpg"); /* image avec logo intégré */
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;

      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.25);
    }

    /* Empêche le scroll sur l'accueil */
    html, body { height: 100%; }
    body { overflow: hidden; }

    /* Responsive */
    @media (max-width: 760px) {
      header { padding: 18px 20px; }
      nav a { margin-left: 14px; font-size: 0.75rem; }
      .brand { font-size: 0.75rem; }
      .logo-small { width: 32px; }
    }

  </style>
</head>

<body>

  <header>
    <a class="brand" href="index.html">
      <img src="logoLFB2.png" alt="Logo LFB Studio" class="logo-small" />
      LFB Studio
    </a>

    <nav>
      <a href="apropos.html">À propos</a>
      <a href="projets.html">Projets</a>
      <a href="offre.html">Offre</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <!-- HERO REMIS (obligatoire pour afficher le fond) -->
  <div class="hero"></div>

</body>
</html>
